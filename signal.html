<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AVA Signal Engine | 250K Particles</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0A0A0F;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
    }
    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }
    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      color: #00D4FF;
      font-family: monospace;
      font-size: 12px;
      pointer-events: none;
      letter-spacing: 2px;
    }
    #hud-instructions {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: #EEF0F4;
      font-family: monospace;
      font-size: 10px;
      opacity: 0.5;
      pointer-events: none;
      letter-spacing: 1px;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="hud">AVA SIGNAL // 250K PARTICLES // PHYSICALIZED LIGHT</div>
  <div id="hud-instructions">HOLD SPACEBAR TO SIMULATE VOICE AUDIO SPIKE</div>
  <div id="canvas-container"></div>

  <script>
    const PARTICLE_COUNT = 250000;
    
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0A0A0F);
    
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const phases = new Float32Array(PARTICLE_COUNT);
    const sizes = new Float32Array(PARTICLE_COUNT);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const i3 = i * 3;
      const phi = Math.acos(1 - 2 * (i + 0.5) / PARTICLE_COUNT);
      const theta = Math.PI * (1 + Math.sqrt(5)) * i;
      
      const r = 2.0 + Math.random() * 0.5;
      
      positions[i3] = r * Math.sin(phi) * Math.cos(theta);
      positions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      positions[i3 + 2] = r * Math.cos(phi);
      
      phases[i] = Math.random() * Math.PI * 2;
      sizes[i] = Math.random() * 2.0 + 0.5;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));
    geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

    const vertexShader = `
      precision highp float;
      uniform float uTime;
      uniform float uAudioLevel;
      uniform vec2 uMouse;
      
      attribute float aPhase;
      attribute float aSize;
      
      varying float vAlpha;
      varying vec3 vColor;
      
      vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
      vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
      
      float snoise(vec3 v) {
        const vec2 C = vec2(1.0/6.0, 1.0/3.0);
        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
        vec3 i  = floor(v + dot(v, C.yyy));
        vec3 x0 = v - i + dot(i, C.xxx);
        vec3 g = step(x0.yzx, x0.xyz);
        vec3 l = 1.0 - g;
        vec3 i1 = min(g.xyz, l.zxy);
        vec3 i2 = max(g.xyz, l.zxy);
        vec3 x1 = x0 - i1 + C.xxx;
        vec3 x2 = x0 - i2 + C.yyy;
        vec3 x3 = x0 - D.yyy;
        i = mod289(i);
        vec4 p = permute(permute(permute(i.z + vec4(0.0, i1.z, i2.z, 1.0)) + i.y + vec4(0.0, i1.y, i2.y, 1.0)) + i.x + vec4(0.0, i1.x, i2.x, 1.0));
        float n_ = 0.142857142857;
        vec3 ns = n_ * D.wyz - D.xzx;
        vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
        vec4 x_ = floor(j * ns.z);
        vec4 y_ = floor(j - 7.0 * x_);
        vec4 x = x_ * ns.x + ns.yyyy;
        vec4 y = y_ * ns.x + ns.yyyy;
        vec4 h = 1.0 - abs(x) - abs(y);
        vec4 b0 = vec4(x.xy, y.xy);
        vec4 b1 = vec4(x.zw, y.zw);
        vec4 s0 = floor(b0) * 2.0 + 1.0;
        vec4 s1 = floor(b1) * 2.0 + 1.0;
        vec4 sh = -step(h, vec4(0.0));
        vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
        vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
        vec3 p0 = vec3(a0.xy, h.x);
        vec3 p1 = vec3(a0.zw, h.y);
        vec3 p2 = vec3(a1.xy, h.z);
        vec3 p3 = vec3(a1.zw, h.w);
        vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
        p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
        vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
        m = m * m;
        return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
      }

      void main() {
        vec3 pos = position;
        
        float noiseVal = snoise(pos * 1.5 + uTime * 0.2 + aPhase);
        float displacement = noiseVal * uAudioLevel * 2.0;
        
        vec3 normal = normalize(pos);
        pos += normal * displacement;
        
        pos *= 1.0 + sin(uTime * 1.5 + aPhase) * 0.05;

        vec3 mousePos3D = vec3(uMouse.x * 5.0, uMouse.y * 5.0, 0.0);
        float distToMouse = length(pos.xy - mousePos3D.xy);
        float pull = smoothstep(2.0, 0.0, distToMouse) * 0.5;
        pos.xy += normalize(mousePos3D.xy - pos.xy + 0.001) * pull;

        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        gl_Position = projectionMatrix * mvPosition;
        
        float depth = (pos.z + 3.0) / 6.0; 
        gl_PointSize = aSize * (1.0 / -mvPosition.z) * 15.0 * (1.0 + uAudioLevel);
        
        vAlpha = smoothstep(0.0, 1.0, depth) * (0.3 + uAudioLevel * 0.7);
        
        vec3 cyan = vec3(0.0, 0.83, 1.0);
        vec3 white = vec3(1.0, 1.0, 1.0);
        vColor = mix(cyan, white, uAudioLevel * noiseVal);
      }
    `;

    const fragmentShader = `
      precision highp float;
      varying float vAlpha;
      varying vec3 vColor;
      
      void main() {
        vec2 coord = gl_PointCoord * 2.0 - 1.0;
        float dist = length(coord);
        if(dist > 1.0) discard;
        
        float glow = exp(-dist * 3.0);
        gl_FragColor = vec4(vColor * glow, vAlpha * glow);
      }
    `;

    const material = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms: {
        uTime: { value: 0 },
        uAudioLevel: { value: 0.0 },
        uMouse: { value: new THREE.Vector2(0, 0) }
      },
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const points = new THREE.Points(geometry, material);
    scene.add(points);

    let targetMouse = new THREE.Vector2(0, 0);
    window.addEventListener('mousemove', (e) => {
      targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    let isSpaceDown = false;
    window.addEventListener('keydown', (e) => { if (e.code === 'Space') isSpaceDown = true; });
    window.addEventListener('keyup', (e) => { if (e.code === 'Space') isSpaceDown = false; });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsedTime = clock.getElapsedTime();
      
      material.uniforms.uMouse.value.lerp(targetMouse, 0.05);
      material.uniforms.uTime.value = elapsedTime;
      
      let targetAudio = isSpaceDown ? 1.0 : 0.0;
      material.uniforms.uAudioLevel.value += (targetAudio - material.uniforms.uAudioLevel.value) * 0.1;
      
      points.rotation.y = elapsedTime * 0.1;
      points.rotation.x = Math.sin(elapsedTime * 0.05) * 0.1;

      renderer.render(scene, camera);
    }
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
